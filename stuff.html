<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirOS Error</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
}

.question{
    font-size:min(35vw,240px);
    font-weight:bold;
    color:#ff0000;
    line-height:1;
    animation:blink 0.8s steps(1,end) infinite;
    text-shadow:0 0 20px #ff0000;
}

.message{
    margin-top:25px;
    font-size:clamp(18px,2vw,28px);
    letter-spacing:1px;
}

@keyframes blink{
    0%,49%{
        opacity:1;
    }
    50%,100%{
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="question">?</div>
    <div class="message">Error reaching AirOS and AirOS Fallback</div>
</div>

<script>
// Pause the blinking when the tab isn't visible
document.addEventListener("visibilitychange", () => {
    document.querySelector(".question").style.animationPlayState =
        document.hidden ? "paused" : "running";
});
</script>

</body>
</html>
